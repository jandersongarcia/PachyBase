server {
    listen 80;
    index index.php;
    root /var/www/html/public;

    location = /openapi.json {
        root /var/www/html/build;
        try_files /openapi.json @pachybase_front_controller;
        default_type application/json;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=30";
    }

    location = /ai-schema.json {
        root /var/www/html/build;
        try_files /ai-schema.json @pachybase_front_controller;
        default_type application/json;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=30";
    }

    location = /ai/schema {
        root /var/www/html/build;
        try_files /ai-schema.json @pachybase_front_controller;
        default_type application/json;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=30";
    }

    location / {
        try_files $uri @pachybase_front_controller;
    }

    location @pachybase_front_controller {
        rewrite ^ /index.php?$query_string last;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
    }
}
