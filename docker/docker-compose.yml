name: pachybase

services:
  web:
    image: nginx:1.27-alpine
    container_name: pachybase-web
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pachybase-php
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: pachybase-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "change_this_password"
      MYSQL_DATABASE: "pachybase"
      MYSQL_USER: "pachybase"
      MYSQL_PASSWORD: "change_this_password"
    volumes:
      - db_mysql_data:/var/lib/mysql

volumes:
  db_mysql_data:

