services:
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: "pachydbase"
      POSTGRES_USER: "pachybase"
      POSTGRES_PASSWORD: "PpG9vwq74rrCmvExXLmuXvxMqHpeAsK0j1HVybe2"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

